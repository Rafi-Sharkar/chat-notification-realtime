name: Build, Push & Deploy

on:
  push:
    branches: [main]

jobs:
  ci-check:
    name:  Format, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: npm install

      - name: Install missing type definitions
        run: npm install --save-dev @types/body-parser @types/jsonwebtoken

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Project
        run: npm run build

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: ci-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - Show what will be built
        run: |
          echo "==========================================="
          echo "Image that will be built and pushed:"
          echo "${{ secrets.DOCKER_USERNAME }}/${{ secrets.PACKAGE_NAME }}:latest"
          echo "==========================================="
          echo "Docker Username: ${{ secrets.DOCKER_USERNAME }}"
          echo "Package Name: ${{ secrets.PACKAGE_NAME }}"
          echo "Timestamp: $(date)"
          echo "==========================================="

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
         
      - name: Clean docker build cache
        run: docker builder prune -af
      - name: Build and Push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.PACKAGE_NAME }}:latest
          no-cache: true
          platforms: linux/amd64

      - name: Show build result
        run: |
          echo "==========================================="
          echo "Build completed!"
          echo "Image digest: ${{ steps.docker_build.outputs.digest }}"
          echo "==========================================="

      - name: Verify image was pushed
        run: |
          echo "Verifying image on Docker Hub..."
          docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.PACKAGE_NAME }}:latest
          docker image inspect ${{ secrets.DOCKER_USERNAME }}/${{ secrets.PACKAGE_NAME }}:latest | grep -E "Created|RepoDigests" -A 2

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          timeout: 120s
          command_timeout: 15m
          script: |
            set -e
            
            echo "========================================="
            echo "Starting deployment process..."
            echo "========================================="
            
            cd /home/${{ secrets.EC2_USER }}/yousef-server
            
            # Source the .env file properly (safer than export)
            set -a
            source .env
            set +a
            
            echo "Image to deploy: ${DOCKER_USERNAME}/${PACKAGE_NAME}:latest"
            echo "✓ Environment variables loaded"
            
            echo "========================================="
            echo "Logging in to Docker Hub..."
            echo "========================================="
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            echo "✓ Docker Hub login successful"
            
            echo "========================================="
            echo "Stopping running containers..."
            echo "========================================="
            docker compose --profile prod down || true
            echo "✓ Containers stopped"
            
            echo "========================================="
            echo "Removing old Docker images..."
            echo "========================================="
            docker rmi -f ${DOCKER_USERNAME}/${PACKAGE_NAME}:latest || true
            docker rmi -f $(docker images ${DOCKER_USERNAME}/${PACKAGE_NAME} -q) 2>/dev/null || true
            echo "✓ Old images removed"
            
            echo "========================================="
            echo "Clearing Docker cache..."
            echo "========================================="
            docker system prune -af
            echo "✓ Cleanup completed"
            
            echo "========================================="
            echo "Pulling latest Docker image..."
            echo "========================================="
            docker pull ${DOCKER_USERNAME}/${PACKAGE_NAME}:latest
            echo "✓ Latest image pulled"
            
            echo "========================================="
            echo "Verifying pulled image..."
            echo "========================================="
            docker image inspect ${DOCKER_USERNAME}/${PACKAGE_NAME}:latest | grep -E "Created|RepoDigests" -A 2
            
            echo "========================================="
            echo "Starting services..."
            echo "========================================="
            docker compose --profile prod up -d --force-recreate --remove-orphans
            echo "✓ Services started"
            
            echo "========================================="
            echo "Waiting for services to initialize..."
            echo "========================================="
            sleep 10
            
            echo "========================================="
            echo "Current running containers:"
            echo "========================================="
            docker compose --profile prod ps
            
            echo "========================================="
            echo "Recent application logs:"
            echo "========================================="
            docker compose --profile prod logs --tail=30 app
            
            echo "========================================="
            echo "Checking application health..."
            echo "========================================="
            sleep 5
            if docker compose --profile prod ps | grep -q "yousef_server.*Up"; then
              echo "✓ Application is running"
            else
              echo "✗ WARNING: Application may not be running properly"
              docker compose --profile prod logs app
              exit 1
            fi
            
            echo "========================================="
            echo "✓ Deployment completed successfully!"
            echo "========================================="
            
            docker logout